services:
  mysql:
    image: mysql:8.4-oraclelinux9
    container_name: healthtech-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthtech-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - public
      - internal

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: healthtech-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      - public

  nginx:
    image: nginx:1.27-alpine
    container_name: healthtech-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - public

  s3-worker:
    build:
      context: ../s3_worker
      dockerfile: Dockerfile
    container_name: healthtech-s3-worker
    restart: unless-stopped
    env_file:
      - ../s3_worker/.env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal

  loki:
    image: grafana/loki:3.4.3
    container_name: healthtech-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    networks:
      - internal

  grafana:
    image: grafana/grafana:11.6.0
    container_name: healthtech-grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.4.3
    container_name: healthtech-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - promtail_data:/tmp
    depends_on:
      - loki
    networks:
      - internal

volumes:
  mysql_data:
  loki_data:
  grafana_data:
  promtail_data:

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
