events {
  worker_connections 1024;
}

http {
  upstream frontend_upstream {
    server frontend:3000;
  }

  upstream backend_upstream {
    server backend:3001;
  }

  # ═══════════════════════════════════════════════════════════
  # HTTP Server (puerto 80) — ACTIVO POR DEFECTO
  # ═══════════════════════════════════════════════════════════
  # Usar esto para pruebas iniciales sin SSL.
  # Cuando tengas SSL configurado, comenta este bloque completo
  # y descomenta el bloque "HTTP Redirect" más abajo.

  server {
    listen 80;
    server_name _;  # Cambia a tu dominio: tudominio.com www.tudominio.com

    client_max_body_size 20m;

    # Security Headers (aplican también en HTTP)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting para login (prevenir brute force)
    location = /api/auth/login {
      limit_req zone=login_limit burst=5 nodelay;
      proxy_pass http://backend_upstream/auth/login;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
      proxy_pass http://backend_upstream/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ═══════════════════════════════════════════════════════════
  # HTTP Redirect (puerto 80) — DESCOMENTAR DESPUÉS DE SSL
  # ═══════════════════════════════════════════════════════════
