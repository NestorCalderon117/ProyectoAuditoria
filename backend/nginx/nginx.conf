  # 1. Comenta el bloque HTTP Server de arriba
  # 2. Descomenta este bloque de redirección
  # 3. Descomenta el bloque HTTPS Server de abajo

  # server {
  #   listen 80;
  #   server_name tudominio.com www.tudominio.com;  # Cambia a tu dominio real
  #
